<section class="report-section{% if page_break_before %} report-section--break{% endif %}">
  <h2 class="report-section__title">{{ section.title }}</h2>
  {% if data.access_denied %}
    <p class="report-section__denied">Нет доступа к данным</p>
  {% elif not data.rows %}
    <p class="report-section__empty">Нет данных по выбранным фильтрам</p>
  {% else %}
    <table class="report-table">
      <thead>
        <tr>
          <th>Страна</th>
          <th>Сокращение</th>
          <th>ISO</th>
        </tr>
      </thead>
      <tbody>
        {% for row in data.rows %}
          <tr>
            <td>{{ row.title }}</td>
            <td>{{ row.title_short }}</td>
            <td>{{ row.iso_code }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% endif %}
</section>
