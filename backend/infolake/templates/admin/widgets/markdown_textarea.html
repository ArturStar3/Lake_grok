{% load i18n %}
<div class="markdown-widget{% if widget.inline_mode %} markdown-widget--inline{% endif %}"
     data-preview-url="{{ widget.preview_url }}"
     data-active-tab="edit">
  <div class="markdown-widget__tabs" role="tablist">
    <button type="button" class="markdown-widget__tab markdown-widget__tab--active"
            data-markdown-tab="edit" role="tab" aria-selected="true">
      {% trans "Правка" %}
    </button>
    <button type="button" class="markdown-widget__tab"
            data-markdown-tab="preview" role="tab" aria-selected="false">
      {% trans "Предпросмотр" %}
    </button>
  </div>
  <div class="markdown-widget__toolbar" data-markdown-toolbar>
    <button type="button" class="markdown-widget__btn" data-md-action="h2" title="{% trans 'Заголовок 2' %}">H2</button>
    <button type="button" class="markdown-widget__btn" data-md-action="h3" title="{% trans 'Заголовок 3' %}">H3</button>
    <span class="markdown-widget__divider" aria-hidden="true"></span>
    <button type="button" class="markdown-widget__btn" data-md-action="bold" title="{% trans 'Жирный' %}"><strong>B</strong></button>
    <button type="button" class="markdown-widget__btn" data-md-action="italic" title="{% trans 'Курсив' %}"><em>I</em></button>
    <button type="button" class="markdown-widget__btn" data-md-action="strike" title="{% trans 'Зачёркнутый' %}"><s>S</s></button>
    <span class="markdown-widget__divider" aria-hidden="true"></span>
    <button type="button" class="markdown-widget__btn" data-md-action="ul" title="{% trans 'Список' %}">•</button>
    <button type="button" class="markdown-widget__btn" data-md-action="ol" title="{% trans 'Нумерованный список' %}">1.</button>
    <button type="button" class="markdown-widget__btn" data-md-action="quote" title="{% trans 'Цитата' %}">❝</button>
    <button type="button" class="markdown-widget__btn" data-md-action="link" title="{% trans 'Ссылка' %}">🔗</button>
    <button type="button" class="markdown-widget__btn" data-md-action="table" title="{% trans 'Таблица' %}">▦</button>
    <button type="button" class="markdown-widget__btn" data-md-action="hr" title="{% trans 'Разделитель' %}">—</button>
  </div>
  <div class="markdown-widget__body">
    <textarea name="{{ widget.name }}"{% include "django/forms/widgets/attrs.html" %}>{% if widget.value %}{{ widget.value }}{% endif %}</textarea>
    <div class="markdown-widget__preview markdown-content" data-markdown-preview></div>
  </div>
</div>
