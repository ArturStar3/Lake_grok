services:
  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: tileserver-gl
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./tileserver:/data
    environment:
      # Разрешаем подключения не только с localhost, но и через host.docker.internal / IP машины.
      # Это нужно, когда фронт (или другие клиенты) обращаются к тайлам по IP Windows-хоста.
      TILESERVER_GL_ALLOWED_HOSTS: "localhost,127.0.0.1,host.docker.internal"
    command:
      - "--config"
      - "config.json"
      - "--public_url"
      - "http://localhost:8080/"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infolake-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    env_file:
      - ./backend/.env
    environment:
      # PostgreSQL на хосте (не в Docker)
      DB_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infolake-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # URL для браузера на хосте (не внутренние имена контейнеров).
      # localhost работает, когда браузер на той же Windows-машине (через port publishing).
      # При необходимости открыть с других устройств в LAN — поменяй на http://<твой-windows-ip>:8000 и :8080.
      VITE_API_URL: http://localhost:8000
      VITE_TILESERVER_URL: http://localhost:8080

      # HMR host для Vite WebSocket (критично при Docker).
      # ДЕФОЛТ: "localhost" — работает при обычном доступе http://localhost:5173 (или 127.0.0.1).
      # Если открываешь фронт по IP машины (http://<windows-ip>:5173) из сети/LAN:
      #   1) Поставь сюда реальный IP (например VITE_HMR_HOST: 192.168.1.42) ИЛИ
      #   2) Попробуй VITE_HMR_HOST: host.docker.internal (Docker Desktop резолвит его на хост).
      # После смены — обязательно пересобери фронтенд.
      VITE_HMR_HOST: localhost

      # Polling для hot-reload через bind mount (Windows / Docker Desktop)
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    depends_on:
      - backend
      - tileserver