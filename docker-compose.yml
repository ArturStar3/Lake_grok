# =============================================================================
# ОФФЛАЙН-РАЗВЁРТЫВАНИЕ — см. OFFLINE_MIGRATION.md
# =============================================================================
# На машине С интернетом (подготовка пакета):
#   .\export-offline.ps1
#   → infolake_full_offline.tar + offline-package-manifest.txt
#
# На оффлайн-машине (запуск):
#   .\import-and-start.ps1
#   → docker load + docker compose up -d --no-build --pull never
#
# ЗАПРЕЩЕНО на оффлайн-машине:
#   docker compose build | docker compose pull | docker pull
#
# Образы (pull_policy: never — не тянуть из сети):
#   infolake-backend:latest, infolake-frontend:latest, maptiler/tileserver-gl:latest
# =============================================================================

services:
  tileserver:
    # Используйте тег, который уже есть локально (offline: docker load).
    # При смене тега на машине с интернетом: docker pull maptiler/tileserver-gl:<tag>
    image: maptiler/tileserver-gl:latest
    container_name: tileserver-gl
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./tileserver:/data
    environment:
      TILESERVER_GL_ALLOWED_HOSTS: "localhost,127.0.0.1,host.docker.internal"
    command:
      - "--config"
      - "config.json"
      - "--public_url"
      - "http://localhost:8080/"
    pull_policy: never
    mem_limit: 4g
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Явное имя образа — обязательно для оффлайн-развёртывания
    # Сборка только на машине с интернетом. На целевой без сети используй:
    #   docker load -i infolake_full_offline.tar
    #   docker compose up -d --no-build
    image: infolake-backend:latest
    container_name: infolake-backend
    pull_policy: never   # не пытаемся тянуть/собирать на оффлайн-машине
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    env_file:
      - ./backend/.env
    environment:
      # PostgreSQL на хосте (не в Docker)
      DB_HOST: host.docker.internal
      # Ссылка «Открыть сайт» в Django admin → карта (Vite dev / production frontend).
      FRONTEND_URL: http://localhost:5173
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Явное имя образа — обязательно для оффлайн-развёртывания
    # Сборка только на машине с интернетом. На целевой без сети используй:
    #   docker load -i infolake_full_offline.tar
    #   docker compose up -d --no-build
    image: infolake-frontend:latest
    container_name: infolake-frontend
    pull_policy: never   # не пытаемся тянуть/собирать на оффлайн-машине
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # URL для браузера на хосте (не внутренние имена контейнеров).
      # localhost работает, когда браузер на той же Windows-машине (через port publishing).
      # При необходимости открыть с других устройств в LAN — поменяй на http://<твой-windows-ip>:8000 и :8080.
      VITE_API_URL: http://localhost:8000
      VITE_TILESERVER_URL: http://localhost:8080

      # HMR host для Vite WebSocket (критично при Docker).
      # ДЕФОЛТ: "localhost" — работает при обычном доступе http://localhost:5173 (или 127.0.0.1).
      # Если открываешь фронт по IP машины (http://<windows-ip>:5173) из сети/LAN:
      #   1) Поставь сюда реальный IP (например VITE_HMR_HOST: 192.168.1.42) ИЛИ
      #   2) Попробуй VITE_HMR_HOST: host.docker.internal (Docker Desktop резолвит его на хост).
      # После смены — обязательно пересобери фронтенд.
      VITE_HMR_HOST: localhost

      # Polling для hot-reload через bind mount (Windows / Docker Desktop)
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    depends_on:
      - backend
      - tileserver